<!DOCTYPE html>
<html lang="en" data-theme="modern-mint">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Numdum - Your Personal Journal & Reminder Folio" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
    <link rel="mask-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" color="#000000" />
    <link rel="manifest" href="manifest.json" />
    <title>Numdum - Your Personal Journal & Reminder Folio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Register service worker for push notifications
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(error => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }

      // Listen for messages from service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', event => {
          if (event.data.type === 'COMPLETE_REMINDER') {
            // Dispatch event to the main app
            window.dispatchEvent(new CustomEvent('complete-reminder', {
              detail: { reminderId: event.data.reminderId }
            }));
          } else if (event.data.type === 'SNOOZE_REMINDER') {
            // Dispatch event to the main app
            window.dispatchEvent(new CustomEvent('snooze-reminder', {
              detail: { reminderId: event.data.reminderId }
            }));
          }
        });
      }
    </script>
  </body>
</html>
